<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | DevPilot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav>

    <div class="logo">
        🚀 DevPilot
    </div>

    <ul>

        <li><a href="/">Home</a></li>
        <li><a href="/register">Register</a></li>

    </ul>

</nav>

<section class="hero">

    <h1>Welcome Back 👋</h1>

    <p>Sign in to continue using DevPilot.</p>

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <br><br>

        <button class="primary" type="submit">
            Login
        </button>

    </form>

</section>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
