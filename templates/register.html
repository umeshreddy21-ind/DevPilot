<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | DevPilot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

    <!-- Navigation -->

    <nav>

        <div class="logo">
            🚀 DevPilot
        </div>

        <ul>

            <li><a href="/">Home</a></li>
            <li><a href="/login">Login</a></li>

        </ul>

    </nav>

    <!-- Register Section -->

    <section class="hero">

        <h1>Create Your Account 🚀</h1>

        <p>
            Join DevPilot and start building amazing projects.
        </p>

        <form method="POST">

            <input
                type="text"
                name="fullname"
                placeholder="Full Name"
                required
            >

            <br><br>

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required
            >

            <br><br>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <br><br>

            <button class="primary" type="submit">
                Register
            </button>

        </form>

    </section>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
