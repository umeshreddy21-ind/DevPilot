<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard | DevPilot</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav>

    <div class="logo">
        🚀 DevPilot
    </div>

    <ul>

        <li><a href="/projects">Projects</a></li>

        <li><a href="/logout">Logout</a></li>

    </ul>

</nav>

<section class="hero">

    <h1>Welcome, {{ username }} 👋</h1>

    <p>Your personal developer workspace.</p>

    <div class="feature-container">

        <div class="card">

            <h3>📁 Projects</h3>

            <h2>{{ projects_count }}</h2>

            <p>Total Projects</p>

        </div>

        <div class="card">

            <h3>📝 Notes</h3>

            <h2>Coming Soon</h2>

            <p>Notes Manager</p>

        </div>

        <div class="card">

            <h3>✅ Tasks</h3>

            <h2>Coming Soon</h2>

            <p>Task Manager</p>

        </div>

        <div class="card">

            <h3>🤖 AI</h3>

            <h2>Ready</h2>

            <p>AI Coding Assistant</p>

        </div>

    </div>

    <br><br>

    <a href="/projects">

        <button class="primary">

            Manage Projects

        </button>

    </a>

</section>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>

</html>
